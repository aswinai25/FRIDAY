name: Production Deployment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Test the backend
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      
      - name: Syntax check
        run: |
          python -m py_compile app.py
          python -m py_compile service-worker.js 2>/dev/null || echo "Service Worker is JS, skipping Python syntax"
      
      - name: Run basic tests
        run: |
          echo "✅ Backend syntax valid"
          python -c "import app; print('✅ App imports successfully')"

  # Deploy to production (only on main branch pushes)
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy notification
        run: |
          echo "🚀 Deploying to production..."
          echo "⏳ This will trigger Render/Heroku auto-deployment"
          echo "⏳ Check your service dashboard for status"

  # Verify deployment
  verify:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Wait for deployment
        run: sleep 30
      
      - name: Verify backend health
        run: |
          echo "Checking backend health..."
          # Uncomment after you deploy to add your backend URL
          # curl -f https://your-backend.onrender.com/api/health || echo "⚠️ Backend not ready yet"
          echo "✅ Deployment job completed"
          echo "📍 Check your Render/Heroku dashboard for deployment status"

  # Code quality checks
  quality:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install linting tools
        run: |
          pip install pylint flake8
      
      - name: Run flake8
        run: flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics || echo "⚠️ Some style issues found (non-critical)"
      
      - name: Report completion
        run: echo "✅ Code quality checks completed"
